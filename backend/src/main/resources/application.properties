server.port=8080

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/filterx_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable Spring Security auto-configuration (we're using it only for BCrypt)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# CORS configuration
cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.example.filterx=DEBUG
